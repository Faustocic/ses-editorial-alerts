# INPS Alert — workflow quotidiano per i cicli "Evergreen Pagamenti" e "Concorsi Pubblici"
# Posizione nel repo: .github/workflows/inps_alert.yml
# Nella root del repo vanno: inps_monitor.py, scadenzario_alert.py,
# concorsi_monitor.py, concorsi_scadenze.py e coda_bandi.json (quest'ultimo
# è la coda bandi: il workflow lo LEGGE soltanto, si aggiorna in sessione).
#
# CORREZIONE 11/7/2026 — la versione precedente eseguiva SOLO inps_monitor.py:
# scadenzario_alert.py non veniva mai lanciato e seen_scadenzario.json non veniva
# mai committato. Risultato: le issue con etichetta "scadenzario" (finestre editoriali
# in apertura) non sono mai state generate.
#
# AGGIORNAMENTO 13/7/2026 — aggiunto lo step del monitor concorsi (etichetta
# "concorsi-alert").
#
# AGGIORNAMENTO 14/7/2026 (v3) — aggiunto lo step dell'alert di calendario dei
# concorsi (concorsi_scadenze.py, etichetta "scadenzario-concorsi") e il commit
# di seen_concorsi_scadenze.json.
#
# AGGIORNAMENTO 14/7/2026 (v4) — aggiunto lo step "Esporta la coda issue aperte":
# l'API GitHub anonima interrogata dai Progetti Claude a inizio sessione è quasi
# sempre in rate limit (60 req/ora per IP condiviso). Il workflow, già autenticato
# con il proprio GITHUB_TOKEN, esporta le issue aperte (TUTTE le etichette, quindi
# entrambi i cicli) in open_issues.json nella root; i Progetti lo leggono via
# raw.githubusercontent.com, canale senza rate limit API. Il file riflette lo
# stato all'ultimo run. Questo file SOSTITUISCE per intero il precedente
# (regola: mai merge piecemeal).

name: INPS Alert

on:
  schedule:
    # 05:30 UTC = 07:30 in Italia con ora legale (06:30 in inverno).
    # I cron di GitHub possono slittare di qualche minuto: irrilevante qui.
    - cron: "30 5 * * *"
  workflow_dispatch: {}   # avvio manuale per il test iniziale

permissions:
  contents: write   # per committare i file di stato
  issues: write     # per aprire le issue di alert

concurrency:
  group: inps-alert
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Esegui il monitor INPS
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -f inps_monitor.py ]; then
            python inps_monitor.py
          else
            echo "::warning::inps_monitor.py non presente nella root del repo: step saltato. Gli alert INPS NON verranno generati."
          fi

      # Step aggiunto l'11/7/2026. `if: always()` perché un errore del monitor
      # (rete, rate limit di Google News) non deve impedire gli alert di calendario,
      # che sono quelli che scandiscono il ritmo editoriale.
      - name: Esegui l'alert dello scadenzario
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -f scadenzario_alert.py ]; then
            python scadenzario_alert.py
          else
            echo "::warning::scadenzario_alert.py non presente nella root del repo: step saltato. Gli alert di finestra editoriale NON verranno generati."
          fi

      # Step aggiunto il 13/7/2026 — ciclo "Concorsi Pubblici", canale fonti.
      - name: Esegui il monitor concorsi
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -f concorsi_monitor.py ]; then
            python concorsi_monitor.py
          else
            echo "::warning::concorsi_monitor.py non presente nella root del repo: step saltato. Gli alert concorsi NON verranno generati."
          fi

      # Step aggiunto il 14/7/2026 — ciclo "Concorsi Pubblici", canale calendario.
      # Legge coda_bandi.json: se il file manca lo script stesso lo segnala
      # con un warning ed esce pulito.
      - name: Esegui l'alert scadenze concorsi
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -f concorsi_scadenze.py ]; then
            python concorsi_scadenze.py
          else
            echo "::warning::concorsi_scadenze.py non presente nella root del repo: step saltato. I reminder di scadenza concorsi NON verranno generati."
          fi

      # Step aggiunto il 14/7/2026 (v4). Gira DOPO tutti i monitor, così cattura
      # anche le issue appena aperte in questo stesso run. `gh` è preinstallato
      # sui runner e usa il GITHUB_TOKEN del workflow: nessun rate limit anonimo.
      - name: Esporta la coda issue aperte
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --repo "${{ github.repository }}" --state open \
            --json number,title,labels,createdAt,url \
            --limit 100 > issues_raw.json
          python - <<'EOF'
          import json
          from datetime import datetime, timezone
          issues = json.load(open("issues_raw.json"))
          out = {
              "generated_at": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "open_issues": issues,
          }
          json.dump(out, open("open_issues.json", "w"), ensure_ascii=False, indent=1)
          print(f"[ok] coda esportata: {len(issues)} issue aperte")
          EOF
          rm -f issues_raw.json

      - name: Commit dello stato
        if: always()
        run: |
          git config user.name "inps-alert-bot"
          git config user.email "actions@users.noreply.github.com"
          for f in seen_inps.json seen_scadenzario.json seen_concorsi.json seen_concorsi_scadenze.json open_issues.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "inps-alert: aggiorna stato visti e coda issue"
          git push
